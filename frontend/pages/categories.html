<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — WMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/categories.css" />
  <style>
  </style>
  <link rel="stylesheet" href="../css/theme.css" />
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🏭</div>
      <span>WMS<small>Warehouse System</small></span>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html"       class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="notifications.html"   class="nav-link"><span class="nav-icon">🔔</span> Notifications</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Inventory</div>
      <a href="inventory.html"       class="nav-link"><span class="nav-icon">📦</span> Inventory</a>
      <a href="stock-movements.html" class="nav-link"><span class="nav-icon">🔄</span> Stock Movements</a>
      <a href="products.html"        class="nav-link"><span class="nav-icon">🛒</span> Products</a>
      <a href="categories.html"      class="nav-link active"><span class="nav-icon">🏷️</span> Categories</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Warehouse</div>
      <a href="warehouses.html"      class="nav-link"><span class="nav-icon">🏢</span> Warehouses</a>
      <a href="zones.html"           class="nav-link"><span class="nav-icon">🗺️</span> Zones</a>
      <a href="racks.html"           class="nav-link"><span class="nav-icon">🗄️</span> Racks</a>
      <a href="shelves.html"         class="nav-link"><span class="nav-icon">📚</span> Shelves</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Insights</div>
      <a href="reports.html"         class="nav-link"><span class="nav-icon">📋</span> Reports</a>
      <a href="analytics.html"       class="nav-link"><span class="nav-icon">📈</span> Analytics</a>
      <a href="approvals.html"       class="nav-link"><span class="nav-icon">✅</span> Approvals</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Admin</div>
      <a href="users.html"           class="nav-link"><span class="nav-icon">👥</span> Users</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-role" id="user-role"></div>
        </div>
      </div>
            <button class="sidebar-theme-btn" onclick="toggleTheme()">
        <span class="toggle-icon">☀️</span>
        <span class="toggle-label">Light Mode</span>
      </button>
      <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <div class="topbar">
      <div>
        <div class="topbar-title">Categories</div>
        <div class="topbar-sub">Organise products into categories</div>
      </div>
      <div class="topbar-right">
        <button class="topbar-theme-btn" onclick="toggleTheme()" title="Toggle theme">
          <span class="toggle-icon">☀️</span>
          <span class="toggle-label">Light Mode</span>
        </button>
        <button class="btn btn-primary" id="btn-add">＋ Add Category</button>
      </div>
    </div>

    <div class="page-content">

      <!-- Search -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="toolbar">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search" placeholder="Search categories…" />
            </div>
          </div>
        </div>
      </div>

      <!-- Cards grid -->
      <div id="cat-grid" class="cat-grid">
        <div class="spinner"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Category</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div id="modal-error" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Name *</label>
      <input id="f-name" type="text" class="form-control" placeholder="Category name" />
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="f-desc" class="form-control" rows="3"
        placeholder="Optional description"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-save">Save</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
  <script src="../js/theme.js"></script>
  <script src="../js/api.js"></script>
<script src="../js/categories.js"></script>
</body>
</html>
