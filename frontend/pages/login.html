<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — WMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(6,182,212,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(20,184,166,0.05) 0%, transparent 50%);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      font-size: 26px;
      margin-bottom: 12px;
      box-shadow: 0 0 30px rgba(34,211,238,0.25);
    }

    .login-logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .login-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .login-card h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-card .sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .input-icon-wrap input {
      padding-left: 38px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 15px;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--text); }

    .btn-login {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn-login:hover    { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-footer a { color: var(--cyan); }
    .login-footer a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .back-home {
      position: fixed;
      top: 20px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted, #8899aa);
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 50px;
      transition: all 0.2s;
      z-index: 100;
    }
    .back-home:hover {
      color: #fff;
      background: rgba(255,255,255,0.12);
      transform: translateX(-3px);
    }
  
    .page-theme-toggle {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 7px 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    [data-theme="light"] .page-theme-toggle {
      color: #334155;
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.12);
    }
    .page-theme-toggle:hover {
      background: rgba(34,211,238,0.15);
      border-color: rgba(34,211,238,0.4);
      color: #22d3ee;
    }
  </style>
  <style>
    .back-home-btn {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 7px 14px;
      border-radius: 50px;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .back-home-btn:hover {
      background: rgba(178,213,229,0.15);
      border-color: rgba(178,213,229,0.4);
      color: #b2d5e5;
      transform: translateX(-3px);
    }
    .back-home-btn svg { flex-shrink: 0; }
  </style>
  <link rel="stylesheet" href="../css/theme.css" />
</head>
<body>
  <button class="page-theme-toggle" onclick="toggleTheme()">
    <span class="toggle-icon">☀️</span>
    <span class="toggle-label">Light Mode</span>
  </button>
  <a href="landing.html" class="back-home-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Home
  </a>

  <a href="landing.html" class="back-home">← Back to Home</a>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <div class="icon">🏭</div>
      <h1>WMS Portal</h1>
      <p>Warehouse Management System</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>

      <div id="error-msg"></div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <span class="icon">👤</span>
          <input
            id="username"
            type="text"
            class="form-control"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button class="toggle-pw" id="toggle-pw" type="button">👁️</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login">Sign In</button>

      <div class="divider">or</div>

      <div class="login-footer">
        Don't have an account?
        <a href="register.html">Create one</a>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

    <script src="../js/theme.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // ── Redirect if already logged in ──────────────────────
    if (localStorage.getItem('access')) {
      window.location.href = 'dashboard.html';
    }

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const btnLogin   = document.getElementById('btn-login');
    const errorMsg   = document.getElementById('error-msg');
    const togglePw   = document.getElementById('toggle-pw');

    // ── Toggle password visibility ──────────────────────────
    togglePw.addEventListener('click', () => {
      const isText = passwordEl.type === 'text';
      passwordEl.type  = isText ? 'password' : 'text';
      togglePw.textContent = isText ? '👁️' : '🙈';
    });

    // ── Show error ──────────────────────────────────────────
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    // ── Login handler ───────────────────────────────────────
    async function handleLogin() {
      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      errorMsg.style.display = 'none';

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      btnLogin.disabled     = true;
      btnLogin.textContent  = 'Signing in…';

      try {
        await login(username, password);

        // Fetch user info and cache it
        const user = await getCurrentUser();
        if (user) localStorage.setItem('user', JSON.stringify(user));

        window.location.href = 'dashboard.html';
      } catch (err) {
        const msg =
          err?.detail ||
          err?.non_field_errors?.[0] ||
          'Invalid username or password.';
        showError(msg);
      } finally {
        btnLogin.disabled    = false;
        btnLogin.textContent = 'Sign In';
      }
    }

    // ── Events ──────────────────────────────────────────────
    btnLogin.addEventListener('click', handleLogin);

    // Enter key on either field
    [usernameEl, passwordEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    // Focus username on load
    usernameEl.focus();
  </script>

</body>
</html>
