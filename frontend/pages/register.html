<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — WMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(6,182,212,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(20,184,166,0.05) 0%, transparent 50%);
      padding: 24px 16px;
    }

    .register-wrap {
      width: 100%;
      max-width: 460px;
    }

    .register-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .register-logo .icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      font-size: 26px;
      margin-bottom: 12px;
      box-shadow: 0 0 30px rgba(34,211,238,0.25);
    }

    .register-logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .register-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .register-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .register-card h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .register-card .sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .input-icon-wrap input,
    .input-icon-wrap select {
      padding-left: 36px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--text); }

    .btn-register {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn-register:hover    { opacity: 0.88; }
    .btn-register:disabled { opacity: 0.5; cursor: not-allowed; }

    .register-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .register-footer a { color: var(--cyan); }
    .register-footer a:hover { text-decoration: underline; }

    #error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }

    #success-msg {
      display: none;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: #34d399;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .strength-bar {
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .strength-label {
      font-size: 11px;
      margin-top: 4px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="register-wrap">

    <!-- Logo -->
    <div class="register-logo">
      <div class="icon">🏭</div>
      <h1>WMS Portal</h1>
      <p>Create your account</p>
    </div>

    <!-- Card -->
    <div class="register-card">
      <h2>Create Account</h2>
      <p class="sub">Fill in the details below to get started</p>

      <div id="error-msg"></div>
      <div id="success-msg"></div>

      <!-- Name row -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input id="first-name" type="text" class="form-control" placeholder="John" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input id="last-name" type="text" class="form-control" placeholder="Doe" />
          </div>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <span class="icon">🪪</span>
          <input id="username" type="text" class="form-control" placeholder="johndoe" autocomplete="username" />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="icon">✉️</span>
          <input id="email" type="email" class="form-control" placeholder="john@company.com" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input id="password" type="password" class="form-control" placeholder="Min. 8 characters" autocomplete="new-password" />
          <button class="toggle-pw" id="toggle-pw1" type="button">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input id="password2" type="password" class="form-control" placeholder="Re-enter password" autocomplete="new-password" />
          <button class="toggle-pw" id="toggle-pw2" type="button">👁️</button>
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label class="form-label">Role</label>
        <div class="input-icon-wrap">
          <span class="icon">🏷️</span>
          <select id="role" class="form-control">
            <option value="">Select a role…</option>
            <option value="staff">Staff</option>
            <option value="supervisor">Supervisor</option>
            <option value="manager">Manager</option>
          </select>
        </div>
      </div>

      <button class="btn-register" id="btn-register">Create Account</button>

      <div class="register-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('access')) {
      window.location.href = 'dashboard.html';
    }

    // ── Elements ────────────────────────────────────────────
    const firstNameEl   = document.getElementById('first-name');
    const lastNameEl    = document.getElementById('last-name');
    const usernameEl    = document.getElementById('username');
    const emailEl       = document.getElementById('email');
    const passwordEl    = document.getElementById('password');
    const password2El   = document.getElementById('password2');
    const roleEl        = document.getElementById('role');
    const btnRegister   = document.getElementById('btn-register');
    const errorMsg      = document.getElementById('error-msg');
    const successMsg    = document.getElementById('success-msg');
    const strengthFill  = document.getElementById('strength-fill');
    const strengthLabel = document.getElementById('strength-label');

    // ── Toggle password visibility ──────────────────────────
    document.getElementById('toggle-pw1').addEventListener('click', () => {
      const isText = passwordEl.type === 'text';
      passwordEl.type = isText ? 'password' : 'text';
      document.getElementById('toggle-pw1').textContent = isText ? '👁️' : '🙈';
    });

    document.getElementById('toggle-pw2').addEventListener('click', () => {
      const isText = password2El.type === 'text';
      password2El.type = isText ? 'password' : 'text';
      document.getElementById('toggle-pw2').textContent = isText ? '👁️' : '🙈';
    });

    // ── Password strength ───────────────────────────────────
    passwordEl.addEventListener('input', () => {
      const pw  = passwordEl.value;
      let score = 0;
      if (pw.length >= 8)            score++;
      if (/[A-Z]/.test(pw))          score++;
      if (/[0-9]/.test(pw))          score++;
      if (/[^A-Za-z0-9]/.test(pw))   score++;

      const colors = ['#ef4444','#f59e0b','#22d3ee','#10b981'];
      const labels = ['Weak','Fair','Good','Strong'];

      strengthFill.style.width      = `${score * 25}%`;
      strengthFill.style.background = colors[score - 1] || 'transparent';
      strengthLabel.textContent     = pw.length ? labels[score - 1] || '' : '';
    });

    // ── Show messages ───────────────────────────────────────
    function showError(msg) {
      errorMsg.textContent    = msg;
      errorMsg.style.display  = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent   = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display   = 'none';
    }

    // ── Register handler ────────────────────────────────────
    async function handleRegister() {
      errorMsg.style.display   = 'none';
      successMsg.style.display = 'none';

      const firstName = firstNameEl.value.trim();
      const lastName  = lastNameEl.value.trim();
      const username  = usernameEl.value.trim();
      const email     = emailEl.value.trim();
      const password  = passwordEl.value;
      const password2 = password2El.value;
      const role      = roleEl.value;

      // Validation
      if (!firstName || !lastName || !username || !email || !password || !role) {
        showError('Please fill in all fields.');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (password !== password2) {
        showError('Passwords do not match.');
        return;
      }

      btnRegister.disabled    = true;
      btnRegister.textContent = 'Creating account…';

      try {
        await register({
          first_name: firstName,
          last_name:  lastName,
          username,
          email,
          password,
          password2,
          role,
        });

        showSuccess('Account created! Redirecting to login…');

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1800);

      } catch (err) {
        const firstError =
          Object.values(err || {})[0];
        const msg = Array.isArray(firstError)
          ? firstError[0]
          : (err?.detail || 'Registration failed. Please try again.');
        showError(msg);
      } finally {
        btnRegister.disabled    = false;
        btnRegister.textContent = 'Create Account';
      }
    }

    btnRegister.addEventListener('click', handleRegister);

    // Enter key support
    [firstNameEl, lastNameEl, usernameEl, emailEl,
     passwordEl, password2El, roleEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleRegister();
      });
    });

    firstNameEl.focus();
  </script>

</body>
</html>
